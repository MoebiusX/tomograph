  <symbol id="ic-browser" viewBox="0 0 24 24"><rect class="i" x="3" y="4" width="18" height="15" rx="2"/><path class="i" d="M3 8h18"/></symbol>
  <symbol id="ic-server" viewBox="0 0 24 24"><rect class="i" x="3" y="4" width="18" height="6" rx="1.5"/><rect class="i" x="3" y="14" width="18" height="6" rx="1.5"/><circle cx="7" cy="7" r="0.7" fill="currentColor"/><circle cx="7" cy="17" r="0.7" fill="currentColor"/></symbol>
  <symbol id="ic-chip" viewBox="0 0 24 24"><rect class="i" x="6" y="6" width="12" height="12" rx="2"/><path class="i" d="M9 3v3M15 3v3M9 18v3M15 18v3M3 9h3M3 15h3M18 9h3M18 15h3"/></symbol>
  <symbol id="ic-compass" viewBox="0 0 24 24"><circle class="i" cx="12" cy="12" r="9"/><path class="i" d="M15.5 8.5l-2 5-5 2 2-5z"/></symbol>
  <symbol id="ic-stetho" viewBox="0 0 24 24"><path class="i" d="M5 3v5a4 4 0 008 0V3"/><path class="i" d="M9 15a5 5 0 0010 0v-2"/><circle class="i" cx="19" cy="9" r="2"/></symbol>
