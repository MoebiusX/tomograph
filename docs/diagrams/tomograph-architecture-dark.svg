<rect class="pg" x="0" y="0" width="1240" height="812"/>

<!-- STUDIO -->
<rect class="band" x="20" y="22" width="760" height="128" rx="12"/>
<use href="#ic-browser" x="34" y="30" width="17" height="17" color="#9fb0cc"/><text class="bl" x="58" y="42">STUDIO · thin vanilla-JS client (studio/)</text>
<rect class="mod" x="34" y="56" width="172" height="80" rx="8"/><use href="#ic-cube" x="44" y="68" width="15" height="15" color="#cbd5e1"/><text class="mt" x="64" y="80">Shell</text><text class="sub" x="44" y="100">app · state · api</text><text class="sub" x="44" y="115">router · home · MCP</text>
<rect class="mod" x="218" y="56" width="172" height="80" rx="8"/><use href="#ic-compass" x="228" y="68" width="15" height="15" color="#cbd5e1"/><text class="mt" x="248" y="80">Discover</text><text class="sub" x="228" y="100">layers-view · drawer</text><text class="sub" x="228" y="115">the tomogram</text>
<rect class="acc" x="402" y="56" width="172" height="80" rx="8"/><use href="#ic-stetho" x="412" y="68" width="15" height="15" color="#c9b6fb"/><text class="at" x="432" y="80">Diagnose ★</text><text class="sub" x="412" y="100">compare-view (3.1k)</text><text class="sub" x="412" y="115">grade · drift · chain</text>
<rect class="mod" x="586" y="56" width="180" height="80" rx="8"/><use href="#ic-wrench" x="596" y="68" width="15" height="15" color="#cbd5e1"/><text class="mt" x="616" y="80">Remediate</text><text class="sub" x="596" y="100">compile-view · reconcile</text><text class="sub" x="596" y="115">+ atlases · otlp</text><text class="note" x="596" y="129" fill="#fca5a5">UI · not unit-tested</text>

<!-- gap 1: single arrow, label well clear -->
<line class="ar" x1="120" y1="152" x2="120" y2="184" marker-end="url(#dn)"/>
<text class="arl" x="138" y="172">HTTP /api/*  —  server returns { diff, chain-integrity }</text>

<!-- SERVER -->
<rect class="band" x="20" y="188" width="760" height="90" rx="12"/>
<use href="#ic-server" x="34" y="196" width="17" height="17" color="#9fb0cc"/><text class="bl" x="58" y="208">SERVER · Express (server/index.mjs · 1.4k)</text>
<rect class="mod" x="34" y="220" width="356" height="48" rx="8"/><text class="mt" x="44" y="240">Pack registry</text><text class="sub" x="44" y="257">catalog ∪ examples ∪ uploads</text>
<rect class="mod" x="402" y="220" width="364" height="48" rx="8"/><text class="mt" x="412" y="240">API endpoints</text><text class="sub" x="412" y="257">diff → { diffPacks, comparePackBranches }</text>

<!-- gap 2 -->
<line class="ar" x1="120" y1="278" x2="120" y2="312" marker-end="url(#dn)"/>
<text class="arl" x="138" y="299">imports (ESM)</text>

<!-- ENGINE -->
<rect class="band" x="20" y="314" width="760" height="472" rx="12"/>
<use href="#ic-chip" x="34" y="322" width="17" height="17" color="#9fb0cc"/><text class="bl" x="58" y="334">ENGINE · tools/lib (pure ESM · shared by server + studio + CLIs)</text>

<rect class="mod" x="34" y="348" width="232" height="148" rx="8"/><use href="#ic-swap" x="46" y="360" width="15" height="15" color="#cbd5e1"/><text class="mt" x="66" y="372">Decompile</text>
<text class="sub" x="46" y="394">crawler — repo x-ray (950)</text><text class="sub" x="46" y="410">sli-inference · l2x</text><text class="sub" x="46" y="426">mini-yaml · validator</text><text class="note" x="46" y="484">repo → pack (the inverse)</text>

<rect class="mod" x="274" y="348" width="232" height="148" rx="8"/><use href="#ic-cube" x="286" y="360" width="15" height="15" color="#cbd5e1"/><text class="mt" x="306" y="372">Model · IR</text>
<text class="sub" x="286" y="394">adapter — spec → layers (647)</text><text class="sub" x="286" y="410">artefact-model — identity ·</text><text class="sub" x="286" y="425">behaviour · classify</text><text class="note" x="286" y="484">attaches mcp.verified.* stamps</text>

<rect class="acc" x="514" y="348" width="232" height="148" rx="8"/><use href="#ic-compare" x="526" y="360" width="15" height="15" color="#c9b6fb"/><text class="at" x="546" y="372">Compare ★ (all wired)</text>
<text class="sub" x="526" y="394">diff — flat pack arithmetic</text><text class="sub" x="526" y="410">traceability — 1-pack chains</text><text class="sub" x="526" y="425">traceability-graph (762) —</text><text class="sub" x="526" y="440">req-rooted DAG · Lezer-parsed</text><text class="note" x="526" y="484">chain integrity → server → grade</text>

<rect class="grn" x="34" y="510" width="232" height="148" rx="8"/><use href="#ic-code" x="46" y="522" width="15" height="15" color="#7ee9bd"/><text class="gt" x="66" y="534">Static analysis ✓</text>
<text class="sub" x="46" y="556">promql — tokeniser (353)</text><text class="sub" x="46" y="572">promql-lezer — Lezer (100)</text><text class="sub" x="46" y="588">Prometheus official grammar</text><text class="note" x="46" y="642">tested · → crawler · trace · graph</text>

<rect class="mod" x="274" y="510" width="232" height="148" rx="8"/><use href="#ic-wrench" x="286" y="522" width="15" height="15" color="#cbd5e1"/><text class="mt" x="306" y="534">Compile</text>
<text class="sub" x="286" y="556">compile — packc (1.3k)</text><text class="sub" x="286" y="572">profiles — product canon</text><text class="sub" x="286" y="588">protocols — version/caps</text><text class="note" x="286" y="646">pack → Prom · Grafana · OTel</text>

<rect class="grn" x="514" y="510" width="232" height="148" rx="8"/><use href="#ic-shield" x="526" y="522" width="15" height="15" color="#7ee9bd"/><text class="gt" x="546" y="534">Score &amp; IO ✓</text>
<text class="sub" x="526" y="556">conformance — 29 clauses ✓</text><text class="sub" x="526" y="572">grade — diagnostic-grade.mjs (404)</text><text class="sub" x="526" y="587">pure module · 25 verdict tests ✓</text><text class="sub" x="526" y="603">zip — export</text><text class="note" x="526" y="646">PASS gate (&gt;85%) locked by tests</text>

<rect class="grn" x="34" y="670" width="712" height="100" rx="8"/><use href="#ic-pulse" x="46" y="678" width="16" height="16" color="#7ee9bd"/><text class="gt" x="68" y="692">Runtime / semantic verification ✓ — MCP prober (the 6fcb7ef commit)</text>
<text class="sub" x="46" y="714">adapter stamps per-artefact mcp.verified.&lt;symbol&gt; (ISO ts) + mcp.versions.&lt;product&gt; live captures</text>
<text class="sub" x="46" y="732">graph marks each node live-verifiable vs not; declared / derived-promql / inferred provenance per edge</text>
<text class="note" x="46" y="754">scrape_job now a first-class verifiable node · “live can’t see it” ≠ “missing in prod”</text>

<!-- SIDE: CLIs -->
<rect class="side" x="798" y="22" width="200" height="226" rx="10"/><use href="#ic-flask" x="812" y="30" width="15" height="15" color="#fcd34d"/><text class="st" x="834" y="42">CLIs · tools/*.mjs</text>
<text class="sub" x="812" y="66">crawl-repo · fetch-live</text><text class="sub" x="812" y="84">validate-pack · adapt</text><text class="sub" x="812" y="102">sync-spec · detect-drift</text>
<text class="note" x="812" y="128">TESTS (in CI, c8): 12 files —</text><text class="note" x="812" y="144">adapt·fetch·packs·compile·profiles·</text><text class="note" x="812" y="160">promql·crawl·diff·diagnostic·</text><text class="note" x="812" y="176">traceability·zip·server</text>
<text class="note" x="812" y="202" fill="#7ee9bd">graph + grade: both tested ✓</text>
<text class="note" x="812" y="226">↳ call the same Engine</text>

<!-- SIDE: Vendor -->
<rect class="side" x="798" y="262" width="200" height="132" rx="10"/><use href="#ic-book" x="812" y="270" width="15" height="15" color="#fcd34d"/><text class="st" x="834" y="282">Vendor · spec v1.2</text>
<text class="sub" x="812" y="306">schema · maturity-model</text><text class="sub" x="812" y="324">payment-service example</text><text class="note" x="812" y="350">checksummed · pinned</text><text class="note" x="812" y="368">↳ feeds validator + conformance</text>

<!-- WHAT IT IS -->
<rect x="798" y="408" width="420" height="378" rx="10" fill="#11192c" stroke="#26324c"/>
<text class="bl" x="814" y="430">WHAT IT IS · one toolchain (verified @ 08205a5)</text>
<use href="#ic-swap"    x="814" y="444" width="15" height="15" color="#c084fc"/><text class="sub" x="836" y="456">bidirectional compiler ⇄ decompiler  (packc / x-ray)</text>
<use href="#ic-cube"    x="814" y="466" width="15" height="15" color="#c084fc"/><text class="sub" x="836" y="478">vendor-neutral IR + multi-backend  (LLVM-like)</text>
<use href="#ic-code"    x="814" y="488" width="15" height="15" color="#34d399"/><text class="sub" x="836" y="500">static analyzer of executable layer  (PromQL · Lezer)</text>
<use href="#ic-pulse"   x="814" y="510" width="15" height="15" color="#34d399"/><text class="sub" x="836" y="522">runtime verifier / OTel-MCP prober  (mcp.verified.*)</text>
<use href="#ic-compare" x="814" y="532" width="15" height="15" color="#c084fc"/><text class="sub" x="836" y="544">drift / calibration &amp; reconciliation instrument</text>
<use href="#ic-shield"  x="814" y="554" width="15" height="15" color="#c084fc"/><text class="sub" x="836" y="566">referential / chain-integrity checker (L1→L4)</text>
<use href="#ic-book"    x="814" y="576" width="15" height="15" color="#c084fc"/><text class="sub" x="836" y="588">conformance grader + provenance tracker</text>
<line x1="814" y1="606" x2="1202" y2="606" stroke="#26324c"/>
<text class="note" x="814" y="624">Requirement-chain integrity (graph) feeds the</text>
<text class="note" x="814" y="640">drift-free / trust signal in the studio grade.</text>
<line x1="814" y1="654" x2="1202" y2="654" stroke="#26324c"/>
<text class="bl" x="814" y="674" font-size="11px">LEGEND</text>
<rect class="acc" x="814" y="684" width="16" height="12" rx="3"/><text class="sub" x="838" y="694">diagnose path · ★ active · all wired</text>
<rect class="grn" x="814" y="702" width="16" height="12" rx="3"/><text class="sub" x="838" y="712">static + runtime verification · shipping</text>
<rect class="warn" x="814" y="720" width="16" height="12" rx="3"/><text class="sub" x="838" y="730">honest gap: studio UI views not unit-tested</text>
<text class="note" x="814" y="754">numbers = LOC · verified at HEAD 08205a5</text>
<text class="note" x="814" y="772">icons decorative — labels are the source of truth</text>
