  <symbol id="ic-swap" viewBox="0 0 24 24"><path class="i" d="M4 8h13l-3-3M20 16H7l3 3"/></symbol>
  <symbol id="ic-cube" viewBox="0 0 24 24"><path class="i" d="M12 3l8 4.5v9L12 21l-8-4.5v-9z"/><path class="i" d="M4 7.5l8 4.5 8-4.5M12 12v9"/></symbol>
