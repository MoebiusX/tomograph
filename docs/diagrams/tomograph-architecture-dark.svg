<svg viewBox="0 0 1240 812" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Tomograph architecture (dark), verified at commit 08205a5</title>
<desc>Dark studio-themed architecture map. Studio over HTTP to Express server importing a pure-ESM engine. The engine returns diff plus requirement-chain integrity which feeds the studio grade.</desc>
<style>
  .pg{fill:#0b1220;}
  .band{fill:#111a2e;stroke:#26324c;stroke-width:1.4;} .bl{fill:#9fb0cc;font-size:12.5px;font-weight:700;letter-spacing:.03em;}
  .mod{fill:#16203a;stroke:#2a3858;stroke-width:1.1;} .mt{fill:#e7ecf6;font-size:12px;font-weight:700;} .sub{fill:#90a0bd;font-size:10px;} .note{fill:#5e6f8e;font-size:9.5px;}
  .acc{fill:#1d1638;stroke:#a855f7;stroke-width:1.8;} .at{fill:#c9b6fb;font-size:12px;font-weight:700;}
  .grn{fill:#0f2a22;stroke:#34d399;stroke-width:1.5;} .gt{fill:#7ee9bd;font-size:12px;font-weight:700;}
  .warn{fill:#2a1418;stroke:#f87171;stroke-width:1.4;} .wt{fill:#fca5a5;font-size:12px;font-weight:700;}
  .side{fill:#241a08;stroke:#eab308;stroke-width:1.2;} .st{fill:#fcd34d;font-size:11.5px;font-weight:700;}
  .ar{stroke:#6b7c9c;stroke-width:2.2;fill:none;} .arl{fill:#8ea0bd;font-size:10.5px;}
  .i{fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
</style>
<defs>
