            query:
              query: label_values(kube_pod_container_info{origin_prometheus=~"$origin_prometheus",namespace=~"$NameSpace",container=~"$Container"},pod)
              refId: StandardVariableQuery
            current:
              text: All
              value: $__all
            optionsCount: 0
        panelCount: 27
        returnedPanels: 27
        panels:
          - id: 54
            title: Node Resource Overview：Selected Nodes:【$Node】
            type: row
            datasource: null
            targets: []
            gridPos:
              h: 1
