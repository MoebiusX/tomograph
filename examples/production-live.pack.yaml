  policy:
    burn_rate_alerts:
      - slo: kx_wallet_availability_99
        windows:
          - short: 5m
            long: 1h
            factor: 14
            severity: SEV1
          - short: 30m
            long: 6h
            factor: 6
            severity: SEV2
      - slo: kx_exchange_availability_99
