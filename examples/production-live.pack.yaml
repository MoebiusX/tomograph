apiVersion: observability.platform/v1
kind: ObservabilityPack
metadata:
  name: production-live
  version: 0.29679526.0
  owners:
    - mcp-fetcher
  bindings:
    service: production-live
    environments:
      - prod
    criticality: tier-2
  annotations:
    mcp.refreshedAt: 2026-06-06T18:46:52.588Z
    mcp.url: https://www.krystaline.io/mcp/public
    mcp.toolsCalled: system_health,system_topology,anomalies_baselines
    mcp.toolsFailed: anomalies_active
    mcp.probesAttempted: metric_names,scrape_configs,dashboards,alert_rules,recording_rules
    mcp.probesSucceeded: ''
    mcp.servicesDiscovered: kx-exchange,kx-matcher,kx-wallet
    mcp.baselinesComputed: "0"
    mcp.activeAnomalies: "0"
    mcp.verified.otel: 2026-06-06T18:46:52.588Z
    mcp.verified.telemetry.backends.metrics-prom: 2026-06-06T18:46:52.588Z
    mcp.verified.slis.kx_exchange_availability: 2026-06-06T18:46:52.588Z
    mcp.verified.slis.kx_matcher_availability: 2026-06-06T18:46:52.588Z
    mcp.verified.slis.kx_wallet_availability: 2026-06-06T18:46:52.588Z
    mcp.verified.baselines: 2026-06-06T18:46:52.588Z
spec:
  otel:
    semconv: 1.27.0
    resource_attributes:
      required:
        - service.name
    sdk:
      languages:
        - go
      sampling:
        policy: parentbased_traceidratio
        ratio: 0.1
      propagators:
        - tracecontext
  telemetry:
    backends:
      - id: metrics-prom
        signal: metrics
        product: prometheus
      - id: logs-elastic
        signal: logs
        product: elasticsearch
      - id: traces-jaeger
        signal: traces
        product: jaeger
  slis:
    - id: kx_exchange_availability
      description: Availability SLI for kx-exchange (synthesised from MCP system_health).
      type: ratio
      semconv_metric: http.server.request.duration
      good: sum(rate(http_server_request_duration_seconds_count{service_name="kx-exchange",http_response_status_code!~"5.."}[5m]))
      total: sum(rate(http_server_request_duration_seconds_count{service_name="kx-exchange"}[5m]))
    - id: kx_matcher_availability
      description: Availability SLI for kx-matcher (synthesised from MCP system_health).
      type: ratio
      semconv_metric: http.server.request.duration
      good: sum(rate(http_server_request_duration_seconds_count{service_name="kx-matcher",http_response_status_code!~"5.."}[5m]))
      total: sum(rate(http_server_request_duration_seconds_count{service_name="kx-matcher"}[5m]))
    - id: kx_wallet_availability
      description: Availability SLI for kx-wallet (synthesised from MCP system_health).
      type: ratio
      semconv_metric: http.server.request.duration
      good: sum(rate(http_server_request_duration_seconds_count{service_name="kx-wallet",http_response_status_code!~"5.."}[5m]))
      total: sum(rate(http_server_request_duration_seconds_count{service_name="kx-wallet"}[5m]))
  slos:
    - id: kx_exchange_availability_99
      sli: kx_exchange_availability
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: kx_matcher_availability_99
      sli: kx_matcher_availability
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: kx_wallet_availability_99
      sli: kx_wallet_availability
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
  pipelines:
    receivers:
      - name: otlp
    processors:
      - name: memory_limiter
      - name: batch
    exporters:
      metrics:
        kind: prometheusremotewrite
      logs:
        kind: elasticsearch
      traces:
        kind: jaeger
  queries:
    recording_rules:
      - name: platform:kx_exchange_availability:ratio_5m
        expr: ref:slis.kx_exchange_availability
        interval: 30s
      - name: platform:kx_matcher_availability:ratio_5m
        expr: ref:slis.kx_matcher_availability
        interval: 30s
      - name: platform:kx_wallet_availability:ratio_5m
        expr: ref:slis.kx_wallet_availability
        interval: 30s
  dashboards:
    - id: platform-overview
      provider:
        kind: grafana
      folder: platform
      source: file://dashboards/platform-overview.json
  policy:
    burn_rate_alerts:
      - slo: kx_exchange_availability_99
        windows:
          - short: 5m
            long: 1h
            factor: 14
            severity: SEV1
          - short: 30m
            long: 6h
            factor: 6
            severity: SEV2
      - slo: kx_matcher_availability_99
        windows:
          - short: 5m
            long: 1h
            factor: 14
            severity: SEV1
          - short: 30m
            long: 6h
            factor: 6
            severity: SEV2
      - slo: kx_wallet_availability_99
        windows:
          - short: 5m
            long: 1h
            factor: 14
            severity: SEV1
          - short: 30m
            long: 6h
            factor: 6
            severity: SEV2
  alerting:
    routes:
      - severity: SEV1
        channels:
          - msteams: "#platform-oncall"
  baselines:
    mttd_target_p50: 5m
    mttr_target_p50: 2h
    measurement_source: mcp.anomalies_baselines
    review_cadence: weekly
  validation: {}
