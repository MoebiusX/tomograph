      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
  pipelines:
    receivers:
      - name: otlp
    processors:
      - name: memory_limiter
      - name: batch
    exporters:
      metrics:
        kind: prometheusremotewrite
      logs:
        kind: elasticsearch
      traces:
        kind: jaeger
  queries:
    recording_rules:
      - name: platform:kx_exchange_availability:ratio_5m
        expr: ref:slis.kx_exchange_availability
        interval: 30s
      - name: platform:kx_matcher_availability:ratio_5m
        expr: ref:slis.kx_matcher_availability
        interval: 30s
      - name: platform:kx_wallet_availability:ratio_5m
        expr: ref:slis.kx_wallet_availability
        interval: 30s
  dashboards:
    - id: platform-overview
      provider:
        kind: grafana
      folder: platform
      source: file://dashboards/platform-overview.json
  policy:
    burn_rate_alerts:
      - slo: kx_exchange_availability_99
        windows:
          - short: 5m
            long: 1h
            factor: 14
            severity: SEV1
          - short: 30m
            long: 6h
            factor: 6
            severity: SEV2
