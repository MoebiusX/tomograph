  pipelines:
    receivers:
      - name: otlp
    processors:
      - name: memory_limiter
      - name: batch
    exporters:
      metrics:
        kind: prometheusremotewrite
      logs:
        kind: elasticsearch
      traces:
        kind: jaeger
  queries:
    recording_rules:
      - name: finops:cpu:usage_per_pod_5m
        expr: |
          sum(rate(container_cpu_usage_seconds_total{namespace="krystalinex", container!=""}[5m])) by (pod) * 3600
        interval: 5m
      - name: finops:memory:usage_per_pod_gb_hours
        expr: |
          sum(container_memory_working_set_bytes{namespace="krystalinex", container!=""}) by (pod) / 1073741824
        interval: 5m
      - name: finops:kong:overhead_seconds
        expr: |
          histogram_quantile(0.99,
            sum(rate(kong_kong_latency_ms_bucket[5m])) by (le)
          ) / 1000
        interval: 5m
      - name: finops:requests:rate_per_service_5m
        expr: |
          sum(rate(http_requests_total[5m])) by (job)
        interval: 1m
      - name: finops:errors:rate_per_service_5m
        expr: |
          sum(rate(http_request_errors_total[5m])) by (job)
        interval: 1m
      - name: finops:spans:exported_rate_5m
        expr: |
          sum(rate(otelcol_exporter_sent_spans_total[5m]))
        interval: 1m
      - name: finops:spans:dropped_rate_5m
        expr: |
          sum(rate(otelcol_processor_dropped_spans_total[5m]))
        interval: 1m
      - name: finops:spans:sampling_ratio
        expr: |
          (
            sum(rate(otelcol_exporter_sent_spans_total[5m]))
            / (
              sum(rate(otelcol_exporter_sent_spans_total[5m]))
              + sum(rate(otelcol_processor_dropped_spans_total[5m]))
            )
          ) or vector(1)
        interval: 1m
      - name: finops:logs:bytes_rate_per_component_5m
        expr: |
          sum(rate(promtail_read_bytes_total[5m])) by (filename)
        interval: 1m
      - name: finops:cost:request_units_per_service_1h
        expr: |
          (
            sum(increase(http_requests_total[1h])) by (job)
            * 0.000001
          )
        interval: 1m
      - name: finops:cost:telemetry_index_1h
        expr: |
          (
            sum(increase(http_requests_total[1h])) * 0.000001
          )
          +
          (
            sum(rate(otelcol_exporter_sent_spans_total[5m])) * 3600 * 0.00001
          )
        interval: 1m
      - name: slo:availability:error_budget_remaining
        expr: |
          1 - (
            (1 - (slo:availability:composite_1d or vector(1)))
            / (1 - 0.999)
          )
        interval: 1m
      - name: slo:latency:error_budget_remaining
        expr: |
          1 - (
            (1 - slo:http_request_duration:ratio_below_500ms_1d)
            / (1 - 0.95)
          )
        interval: 1m
      - name: slo:http_requests:error_ratio_5m
        expr: |
          (sum(rate(http_request_errors_total{status_code=~"5.."}[5m])) or vector(0))
          /
          (sum(rate(http_requests_total[5m])) > 0)
          or vector(0)
        interval: 30s
      - name: slo:http_requests:error_ratio_30m
        expr: |
          (sum(rate(http_request_errors_total{status_code=~"5.."}[30m])) or vector(0))
          /
          (sum(rate(http_requests_total[30m])) > 0)
          or vector(0)
        interval: 30s
      - name: slo:http_requests:error_ratio_1h
        expr: |
          (sum(rate(http_request_errors_total{status_code=~"5.."}[1h])) or vector(0))
          /
          (sum(rate(http_requests_total[1h])) > 0)
          or vector(0)
        interval: 30s
      - name: slo:http_requests:error_ratio_2h
        expr: |
          (sum(rate(http_request_errors_total{status_code=~"5.."}[2h])) or vector(0))
          /
          (sum(rate(http_requests_total[2h])) > 0)
          or vector(0)
        interval: 30s
      - name: slo:http_requests:error_ratio_6h
        expr: |
          (sum(rate(http_request_errors_total{status_code=~"5.."}[6h])) or vector(0))
          /
          (sum(rate(http_requests_total[6h])) > 0)
          or vector(0)
        interval: 30s
      - name: slo:http_requests:error_ratio_1d
        expr: |
          (sum(rate(http_request_errors_total{status_code=~"5.."}[1d])) or vector(0))
          /
          (sum(rate(http_requests_total[1d])) > 0)
          or vector(0)
        interval: 30s
      - name: slo:http_requests:error_ratio_3d
        expr: |
          (sum(rate(http_request_errors_total{status_code=~"5.."}[3d])) or vector(0))
          /
          (sum(rate(http_requests_total[3d])) > 0)
          or vector(0)
        interval: 30s
      - name: slo:http_request_duration:ratio_below_500ms_5m
        expr: |
          sum(rate(http_request_duration_seconds_bucket{le="0.5"}[5m]))
          /
          (sum(rate(http_request_duration_seconds_count[5m])) > 0)
          or vector(1)
        interval: 30s
      - name: slo:http_request_duration:ratio_below_500ms_1h
        expr: |
          sum(rate(http_request_duration_seconds_bucket{le="0.5"}[1h]))
          /
          (sum(rate(http_request_duration_seconds_count[1h])) > 0)
          or vector(1)
        interval: 30s
      - name: slo:http_request_duration:ratio_below_500ms_1d
        expr: |
          sum(rate(http_request_duration_seconds_bucket{le="0.5"}[1d]))
          /
          (sum(rate(http_request_duration_seconds_count[1d])) > 0)
          or vector(1)
        interval: 30s
      - name: slo:http_request_duration:ratio_below_2s_5m
        expr: |
          sum(rate(http_request_duration_seconds_bucket{le="2"}[5m]))
          /
          (sum(rate(http_request_duration_seconds_count[5m])) > 0)
          or vector(1)
        interval: 30s
      - name: slo:http_request_duration:p95_5m
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))
        interval: 30s
      - name: slo:http_request_duration:p99_5m
        expr: |
          histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))
        interval: 30s
      - name: slo:http_request_duration:p95_1h
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[1h])) by (le))
        interval: 30s
      - name: slo:http_request_duration:p99_1h
        expr: |
          histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[1h])) by (le))
        interval: 30s
      - name: slo:server:probe_success_ratio_5m
        expr: |
          max(avg_over_time(up{job="krystalinex-server"}[5m]))
          or vector(1)
        interval: 30s
      - name: slo:server:probe_success_ratio_1h
        expr: |
          max(avg_over_time(up{job="krystalinex-server"}[1h]))
          or vector(1)
        interval: 30s
      - name: slo:server:probe_success_ratio_1d
        expr: |
          max(avg_over_time(up{job="krystalinex-server"}[1d]))
          or vector(1)
        interval: 30s
      - name: slo:availability:composite_1h
        expr: |
          (1 - (slo:http_requests:error_ratio_1h or vector(0)))
          *
          (slo:server:probe_success_ratio_1h or vector(1))
        interval: 30s
      - name: slo:availability:composite_1d
        expr: |
          (1 - (slo:http_requests:error_ratio_1d or vector(0)))
          *
          (slo:server:probe_success_ratio_1d or vector(1))
        interval: 30s
      - name: slo:settlement_latency:ratio_below_2s_5m
        expr: |
          sum(rate(settlement_latency_seconds_bucket{le="2"}[5m]))
          /
          (sum(rate(settlement_latency_seconds_count[5m])) > 0)
          or vector(1)
        interval: 30s
      - name: slo:settlement_latency:ratio_below_2s_1h
        expr: |
          sum(rate(settlement_latency_seconds_bucket{le="2"}[1h]))
          /
          (sum(rate(settlement_latency_seconds_count[1h])) > 0)
          or vector(1)
        interval: 30s
      - name: slo:settlement_latency:ratio_below_2s_1d
        expr: |
          sum(rate(settlement_latency_seconds_bucket{le="2"}[1d]))
          /
          (sum(rate(settlement_latency_seconds_count[1d])) > 0)
          or vector(1)
        interval: 30s
      - name: slo:settlement_latency:ratio_below_5s_5m
        expr: |
          sum(rate(settlement_latency_seconds_bucket{le="5"}[5m]))
          /
          (sum(rate(settlement_latency_seconds_count[5m])) > 0)
          or vector(1)
        interval: 30s
      - name: slo:settlement_latency:ratio_below_5s_1h
        expr: |
          sum(rate(settlement_latency_seconds_bucket{le="5"}[1h]))
          /
          (sum(rate(settlement_latency_seconds_count[1h])) > 0)
          or vector(1)
        interval: 30s
      - name: slo:settlement_latency:p95_5m
        expr: |
          histogram_quantile(0.95, sum(rate(settlement_latency_seconds_bucket[5m])) by (le))
        interval: 30s
      - name: slo:settlement_latency:p99_5m
        expr: |
          histogram_quantile(0.99, sum(rate(settlement_latency_seconds_bucket[5m])) by (le))
        interval: 30s
      - name: slo:settlement_latency:p95_1h
        expr: |
          histogram_quantile(0.95, sum(rate(settlement_latency_seconds_bucket[1h])) by (le))
        interval: 30s
      - name: slo:settlement_latency:p99_1h
        expr: |
          histogram_quantile(0.99, sum(rate(settlement_latency_seconds_bucket[1h])) by (le))
        interval: 30s
      - name: slo:settlement_latency:error_budget_remaining
        expr: |
          1 - (
            (1 - slo:settlement_latency:ratio_below_2s_1d)
            / (1 - 0.95)
          )
        interval: 30s
  dashboards:
    - id: adz2hpb
      provider:
        kind: grafana
        version: "12.0"
        schemaVersion: 42
      folder: KrystalineX
      source: grafana:///grafana/d/adz2hpb/k8s-dashboard
      params:
        uid: adz2hpb
        title: K8S Dashboard
        tags:
          - Prometheus
          - Kubernetes
        timezone: browser
        time:
          from: now-30m
          to: now
        dashboardVersion: 1
        variables:
          - name: origin_prometheus
            type: query
            label: K8S
            datasource:
              uid: prometheus
              type: prometheus
            query:
              query: label_values(kube_node_info,origin_prometheus)
              refId: StandardVariableQuery
            current:
              text: ''
              value: ''
            optionsCount: 0
          - name: Node
            type: query
            label: Nodes
            datasource:
              uid: prometheus
              type: prometheus
            query:
              query: label_values(kube_node_info{origin_prometheus=~"$origin_prometheus"},node)
              refId: StandardVariableQuery
            current:
              text: All
              value: $__all
            optionsCount: 0
          - name: NameSpace
            type: query
            label: Namespace
            datasource:
              uid: prometheus
              type: prometheus
            query:
              query: label_values(kube_namespace_created{origin_prometheus=~"$origin_prometheus"},namespace)
              refId: PrometheusVariableQueryEditor-VariableQuery
            current:
              text: krystalinex
              value: krystalinex
            optionsCount: 0
          - name: Container
            type: query
            label: Microservice (Container Name)
            datasource:
              uid: prometheus
              type: prometheus
            query:
              query: label_values(kube_pod_container_info{origin_prometheus=~"$origin_prometheus",namespace=~"$NameSpace"},container)
              refId: StandardVariableQuery
            current:
              text: All
              value: $__all
            optionsCount: 0
          - name: Pod
            type: query
            label: Pod
            datasource:
              uid: prometheus
