  slis:
    - id: kx_wallet_availability
      description: Availability SLI for kx-wallet (synthesised from MCP system_health).
      type: ratio
      semconv_metric: http.server.request.duration
      good: sum(rate(http_server_request_duration_seconds_count{service_name="kx-wallet",http_response_status_code!~"5.."}[5m]))
      total: sum(rate(http_server_request_duration_seconds_count{service_name="kx-wallet"}[5m]))
    - id: kx_exchange_availability
      description: Availability SLI for kx-exchange (synthesised from MCP system_health).
      type: ratio
      semconv_metric: http.server.request.duration
      good: sum(rate(http_server_request_duration_seconds_count{service_name="kx-exchange",http_response_status_code!~"5.."}[5m]))
      total: sum(rate(http_server_request_duration_seconds_count{service_name="kx-exchange"}[5m]))
    - id: kx_matcher_availability
      description: Availability SLI for kx-matcher (synthesised from MCP system_health).
      type: ratio
      semconv_metric: http.server.request.duration
      good: sum(rate(http_server_request_duration_seconds_count{service_name="kx-matcher",http_response_status_code!~"5.."}[5m]))
      total: sum(rate(http_server_request_duration_seconds_count{service_name="kx-matcher"}[5m]))
  slos:
    - id: kx_wallet_availability_99
      sli: kx_wallet_availability
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: kx_exchange_availability_99
      sli: kx_exchange_availability
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: kx_matcher_availability_99
      sli: kx_matcher_availability
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
  pipelines:
    receivers:
      - name: otlp
    processors:
      - name: memory_limiter
      - name: batch
    exporters:
      metrics:
        kind: prometheusremotewrite
      logs:
        kind: elasticsearch
      traces:
        kind: jaeger
  queries:
    recording_rules:
      - name: platform:kx_wallet_availability:ratio_5m
        expr: ref:slis.kx_wallet_availability
        interval: 30s
      - name: platform:kx_exchange_availability:ratio_5m
        expr: ref:slis.kx_exchange_availability
        interval: 30s
      - name: platform:kx_matcher_availability:ratio_5m
        expr: ref:slis.kx_matcher_availability
        interval: 30s
  dashboards:
