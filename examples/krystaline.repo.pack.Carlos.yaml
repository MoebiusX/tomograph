spec:
  otel:
    semconv: 1.26.0
    resource_attributes:
      required:
        - service.name
    sdk:
      languages:
        - go
      sampling:
        policy: parentbased_traceidratio
        ratio: 0.1
      propagators:
        - tracecontext
  slis:
    - id: slo_http_requests
      description: Inferred from recording rule slo:http_requests:error_ratio_5m.
      type: ratio
      good: |
        (sum(rate(http_request_errors_total{status_code=~"5.."}[5m])) or vector(0))
        /
        (sum(rate(http_requests_total[5m])) > 0)
        or vector(0)
      total: "1"
    - id: slo_http_request_duration
      description: Inferred from recording rule slo:http_request_duration:ratio_below_500ms_5m.
      type: ratio
      good: |
        sum(rate(http_request_duration_seconds_bucket{le="0.5"}[5m]))
        /
        (sum(rate(http_request_duration_seconds_count[5m])) > 0)
        or vector(1)
      total: "1"
    - id: slo_server
      description: Inferred from recording rule slo:server:probe_success_ratio_5m.
      type: threshold
      query: |
        max(avg_over_time(up{job="krystalinex-server"}[5m]))
        or vector(1)
      threshold: 1
      unit: ratio
    - id: slo_availability
      description: Inferred from recording rule slo:availability:composite_1h.
      type: threshold
      query: |
        (1 - (slo:http_requests:error_ratio_1h or vector(0)))
        *
        (slo:server:probe_success_ratio_1h or vector(1))
      threshold: 1
      unit: ratio
    - id: slo_latency
      description: Inferred from recording rule slo:latency:error_budget_remaining.
      type: threshold
      query: |
        1 - (
          (1 - slo:http_request_duration:ratio_below_500ms_1d)
          / (1 - 0.95)
        )
      threshold: 1
      unit: ratio
    - id: finops_requests
      description: Inferred from recording rule finops:requests:rate_per_service_5m.
      type: threshold
      query: |
        sum(rate(http_requests_total[5m])) by (job)
      threshold: 1
      unit: ratio
    - id: finops_errors
      description: Inferred from recording rule finops:errors:rate_per_service_5m.
      type: threshold
      query: |
        sum(rate(http_request_errors_total[5m])) by (job)
      threshold: 1
      unit: ratio
    - id: finops_spans
      description: Inferred from recording rule finops:spans:exported_rate_5m.
      type: threshold
      query: |
        sum(rate(otelcol_exporter_sent_spans_total[5m]))
      threshold: 1
      unit: ratio
    - id: finops_logs
      description: Inferred from recording rule finops:logs:bytes_rate_per_component_5m.
      type: threshold
      query: |
        sum(rate(promtail_read_bytes_total[5m])) by (filename)
      threshold: 1
      unit: ratio
    - id: finops_cost
      description: Inferred from recording rule finops:cost:request_units_per_service_1h.
      type: threshold
      query: |
        (
          sum(increase(http_requests_total[1h])) by (job)
          * 0.000001
        )
      threshold: 1
      unit: ratio
    - id: finops_cpu
      description: Inferred from recording rule finops:cpu:usage_per_pod_5m.
      type: threshold
      query: |
        sum(rate(container_cpu_usage_seconds_total{namespace="krystalinex", container!=""}[5m])) by (pod) * 3600
      threshold: 1
      unit: ratio
    - id: finops_memory
      description: Inferred from recording rule finops:memory:usage_per_pod_gb_hours.
      type: threshold
      query: |
        sum(container_memory_working_set_bytes{namespace="krystalinex", container!=""}) by (pod) / 1073741824
      threshold: 1
      unit: ratio
    - id: finops_kong
      description: Inferred from recording rule finops:kong:overhead_seconds.
      type: threshold
      query: |
        histogram_quantile(0.99,
          sum(rate(kong_kong_latency_ms_bucket[5m])) by (le)
        ) / 1000
      threshold: 1
      unit: ratio
