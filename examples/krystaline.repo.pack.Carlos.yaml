            metrics:
              - slo:http_requests:error_ratio_5m
            binds_to: slis.slo_http_requests
            binding_confidence: declared-inferred
            binding_reason: recording rule name, keywords:http|requests|error|ratio
          - panel: error_burn_rate_multi-window
            title: Error Burn Rate (Multi-Window)
            expr: slo:http_requests:error_ratio_1h
            refId: B
            datasource: prometheus
            metrics:
              - slo:http_requests:error_ratio_1h
            binds_to: slis.slo_http_requests
            binding_confidence: declared-inferred
            binding_reason: recording rule name, keywords:http|requests|error|ratio
          - panel: error_burn_rate_multi-window
            title: Error Burn Rate (Multi-Window)
            expr: slo:http_requests:error_ratio_1d
            refId: C
            datasource: prometheus
            metrics:
              - slo:http_requests:error_ratio_1d
            binds_to: slis.slo_http_requests
            binding_confidence: declared-inferred
            binding_reason: recording rule name, keywords:http|requests|error|ratio
          - panel: active_users
