            datasource: prometheus
            metrics:
              - ALERTS
          - panel: pending_alerts
            title: Pending Alerts
            expr: count(ALERTS{alertstate="pending"}) or vector(0)
            refId: A
            datasource: prometheus
            metrics:
              - ALERTS
          - panel: critical_firing
            title: Critical Firing
            expr: count(ALERTS{alertstate="firing", severity="critical"}) or vector(0)
            refId: A
            datasource: prometheus
            metrics:
              - ALERTS
          - panel: warnings
            title: Warnings
            expr: count(ALERTS{alertstate=~"firing|pending", severity="warning"}) or vector(0)
            refId: A
            datasource: prometheus
            metrics:
              - ALERTS
          - panel: active_alerts
            title: Active Alerts
            expr: sort_desc(ALERTS{alertstate=~"firing|pending"})
            refId: A
            datasource: prometheus
            metrics:
              - ALERTS
      panel_bindings:
        - panel: Response Latency (P50 / P95)
          binds_to: slis.slo_http_request_duration
        - panel: Server Errors (5xx)
          binds_to: slis.slo_http_requests
        - panel: Client Errors (4xx)
          binds_to: slis.slo_http_requests
        - panel: Analysis by Use Case
          binds_to: slis.genai_rca_analysis
        - panel: LLM Analysis Duration
          binds_to: slis.genai_rca_analysis_duration
        - panel: Availability (99.9% SLO)
          binds_to: slis.slo_availability
        - panel: Latency SLO (95% < 500ms)
          binds_to: slis.slo_http_request_duration
        - panel: Error Budget Remaining
          binds_to: slis.slo_availability
        - panel: Error Burn Rate (Multi-Window)
          binds_to: slis.slo_http_requests
  policy:
