            binds_to: slis.genai_rca_analysis_duration
            binding_confidence: inferred
            binding_reason: shared metrics:kx_llm_analysis_duration_seconds_bucket, keywords:analysis|duration|histogram|seconds
          - panel: llm_analysis_duration
            title: LLM Analysis Duration
            expr: histogram_quantile(0.50, sum(rate(kx_llm_analysis_duration_seconds_bucket[5m])) by (le))
            refId: B
            datasource: prometheus
            metrics:
              - kx_llm_analysis_duration_seconds_bucket
            binds_to: slis.genai_rca_analysis_duration
            binding_confidence: inferred
