            datasource: prometheus
            metrics:
              - http_active_connections
          - panel: node_js_event_loop_lag
            title: Node.js Event Loop Lag
            expr: nodejs_nodejs_eventloop_lag_p99_seconds{job="krystalinex-server"}
            refId: A
            datasource: prometheus
            metrics:
              - nodejs_nodejs_eventloop_lag_p99_seconds
