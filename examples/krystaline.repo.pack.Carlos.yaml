spec:
  otel:
    semconv: 1.26.0
    resource_attributes:
      required:
        - service.name
    sdk:
      languages:
        - go
      sampling:
        policy: parentbased_traceidratio
        ratio: 0.1
      propagators:
        - tracecontext
  slis:
    - id: slo_http_requests
      description: Inferred from recording rule slo:http_requests:error_ratio_5m.
      type: ratio
      good: |
        (sum(rate(http_request_errors_total{status_code=~"5.."}[5m])) or vector(0))
        /
        (sum(rate(http_requests_total[5m])) > 0)
        or vector(0)
      total: "1"
    - id: slo_http_request_duration
      description: Inferred from recording rule slo:http_request_duration:ratio_below_500ms_5m.
      type: ratio
      good: |
        sum(rate(http_request_duration_seconds_bucket{le="0.5"}[5m]))
        /
        (sum(rate(http_request_duration_seconds_count[5m])) > 0)
        or vector(1)
      total: "1"
    - id: slo_server
      description: Inferred from recording rule slo:server:probe_success_ratio_5m.
      type: threshold
      query: |
        max(avg_over_time(up{job="krystalinex-server"}[5m]))
        or vector(1)
      threshold: 1
      unit: ratio
    - id: slo_availability
      description: Inferred from recording rule slo:availability:composite_1h.
      type: threshold
      query: |
        (1 - (slo:http_requests:error_ratio_1h or vector(0)))
        *
        (slo:server:probe_success_ratio_1h or vector(1))
      threshold: 1
      unit: ratio
    - id: slo_latency
      description: Inferred from recording rule slo:latency:error_budget_remaining.
      type: threshold
      query: |
        1 - (
          (1 - slo:http_request_duration:ratio_below_500ms_1d)
          / (1 - 0.95)
        )
      threshold: 1
      unit: ratio
    - id: genai_client_operation_duration
      description: Inferred from recording rule genai:client_operation_duration:p95_5m.
      type: threshold
      query: |
        histogram_quantile(
          0.95,
          sum(rate(gen_ai_client_operation_duration_seconds_bucket[5m]))
            by (le, provider, model, operation)
        )
      threshold: 1
      unit: ratio
    - id: genai_client_operation
      description: Inferred from recording rule genai:client_operation:error_ratio_5m.
      type: ratio
      good: |
        sum(rate(gen_ai_client_operations_total{status=~"error|timeout"}[5m]))
          by (provider, model, operation)
        /
        clamp_min(
          sum(rate(gen_ai_client_operations_total[5m]))
            by (provider, model, operation),
          0.000001
        )
      total: "1"
    - id: genai_client_token_usage
      description: Inferred from recording rule genai:client_token_usage:rate_1h.
      type: threshold
      query: |
        sum(rate(gen_ai_client_token_usage_sum[1h]))
          by (model, direction)
      threshold: 1
      unit: ratio
    - id: genai_rca_analysis_duration
      description: Inferred from recording rule genai:rca_analysis_duration:p95_5m.
      type: threshold
      query: |
        histogram_quantile(
          0.95,
          sum(rate(kx_llm_analysis_duration_seconds_bucket[5m])) by (le)
        )
      threshold: 1
      unit: ratio
    - id: genai_rca_analysis
      description: Inferred from recording rule genai:rca_analysis:failure_ratio_5m.
      type: threshold
      query: |
        sum(rate(kx_llm_analysis_total{status=~"failure|timeout"}[5m]))
          by (use_case)
        /
        clamp_min(
          sum(rate(kx_llm_analysis_total[5m])) by (use_case),
          0.000001
        )
      threshold: 1
      unit: ratio
    - id: finops_requests
      description: Inferred from recording rule finops:requests:rate_per_service_5m.
      type: threshold
      query: |
        sum(rate(http_requests_total[5m])) by (job)
      threshold: 1
      unit: ratio
    - id: finops_errors
      description: Inferred from recording rule finops:errors:rate_per_service_5m.
      type: threshold
      query: |
        sum(rate(http_request_errors_total[5m])) by (job)
      threshold: 1
      unit: ratio
    - id: finops_spans
      description: Inferred from recording rule finops:spans:exported_rate_5m.
      type: threshold
      query: |
        sum(rate(otelcol_exporter_sent_spans_total[5m]))
      threshold: 1
      unit: ratio
    - id: finops_logs
      description: Inferred from recording rule finops:logs:bytes_rate_per_component_5m.
      type: threshold
      query: |
        sum(rate(promtail_read_bytes_total[5m])) by (filename)
      threshold: 1
      unit: ratio
    - id: finops_cost
      description: Inferred from recording rule finops:cost:request_units_per_service_1h.
      type: threshold
      query: |
        (
          sum(increase(http_requests_total[1h])) by (job)
          * 0.000001
        )
      threshold: 1
      unit: ratio
    - id: finops_cpu
      description: Inferred from recording rule finops:cpu:usage_per_pod_5m.
      type: threshold
      query: |
        sum(rate(container_cpu_usage_seconds_total{namespace="krystalinex", container!=""}[5m])) by (pod) * 3600
      threshold: 1
      unit: ratio
    - id: finops_memory
      description: Inferred from recording rule finops:memory:usage_per_pod_gb_hours.
      type: threshold
      query: |
        sum(container_memory_working_set_bytes{namespace="krystalinex", container!=""}) by (pod) / 1073741824
      threshold: 1
      unit: ratio
    - id: finops_kong
      description: Inferred from recording rule finops:kong:overhead_seconds.
      type: threshold
      query: |
        histogram_quantile(0.99,
          sum(rate(kong_kong_latency_ms_bucket[5m])) by (le)
        ) / 1000
      threshold: 1
      unit: ratio
  slos:
    - id: slo_http_requests_99
      sli: slo_http_requests
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: slo_http_request_duration_99
      sli: slo_http_request_duration
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: slo_server_99
      sli: slo_server
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: slo_availability_99
      sli: slo_availability
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: slo_latency_99
      sli: slo_latency
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: genai_client_operation_duration_99
      sli: genai_client_operation_duration
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: genai_client_operation_99
      sli: genai_client_operation
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: genai_client_token_usage_99
      sli: genai_client_token_usage
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: genai_rca_analysis_duration_99
      sli: genai_rca_analysis_duration
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: genai_rca_analysis_99
      sli: genai_rca_analysis
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: finops_requests_99
      sli: finops_requests
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: finops_errors_99
      sli: finops_errors
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: finops_spans_99
      sli: finops_spans
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: finops_logs_99
      sli: finops_logs
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: finops_cost_99
      sli: finops_cost
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: finops_cpu_99
      sli: finops_cpu
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: finops_memory_99
      sli: finops_memory
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
    - id: finops_kong_99
      sli: finops_kong
      objective: 0.99
      window: 30d
      error_budget_policy: ref:platform/default-budget
  pipelines:
    receivers:
      - name: otlp
      - name: otlp
    processors:
      - name: batch
      - name: memory_limiter
      - name: tail_sampling
      - name: batch
    exporters:
      metrics:
        kind: prometheusremotewrite
      logs:
        kind: elasticsearch
      traces:
        kind: jaeger
  queries:
    recording_rules:
      - name: slo:http_requests:error_ratio_5m
        expr: |
          (sum(rate(http_request_errors_total{status_code=~"5.."}[5m])) or vector(0))
          /
          (sum(rate(http_requests_total[5m])) > 0)
          or vector(0)
        interval: 30s
      - name: slo:http_requests:error_ratio_30m
        expr: |
          (sum(rate(http_request_errors_total{status_code=~"5.."}[30m])) or vector(0))
          /
          (sum(rate(http_requests_total[30m])) > 0)
          or vector(0)
        interval: 30s
      - name: slo:http_requests:error_ratio_1h
        expr: |
          (sum(rate(http_request_errors_total{status_code=~"5.."}[1h])) or vector(0))
          /
          (sum(rate(http_requests_total[1h])) > 0)
          or vector(0)
        interval: 30s
      - name: slo:http_requests:error_ratio_2h
        expr: |
          (sum(rate(http_request_errors_total{status_code=~"5.."}[2h])) or vector(0))
          /
          (sum(rate(http_requests_total[2h])) > 0)
          or vector(0)
        interval: 30s
      - name: slo:http_requests:error_ratio_6h
        expr: |
          (sum(rate(http_request_errors_total{status_code=~"5.."}[6h])) or vector(0))
          /
          (sum(rate(http_requests_total[6h])) > 0)
          or vector(0)
        interval: 30s
      - name: slo:http_requests:error_ratio_1d
        expr: |
          (sum(rate(http_request_errors_total{status_code=~"5.."}[1d])) or vector(0))
          /
          (sum(rate(http_requests_total[1d])) > 0)
          or vector(0)
        interval: 30s
      - name: slo:http_requests:error_ratio_3d
        expr: |
          (sum(rate(http_request_errors_total{status_code=~"5.."}[3d])) or vector(0))
          /
          (sum(rate(http_requests_total[3d])) > 0)
          or vector(0)
        interval: 30s
      - name: slo:http_request_duration:ratio_below_500ms_5m
        expr: |
          sum(rate(http_request_duration_seconds_bucket{le="0.5"}[5m]))
          /
          (sum(rate(http_request_duration_seconds_count[5m])) > 0)
          or vector(1)
        interval: 30s
      - name: slo:http_request_duration:ratio_below_500ms_1h
        expr: |
          sum(rate(http_request_duration_seconds_bucket{le="0.5"}[1h]))
          /
          (sum(rate(http_request_duration_seconds_count[1h])) > 0)
          or vector(1)
        interval: 30s
      - name: slo:http_request_duration:ratio_below_500ms_1d
        expr: |
          sum(rate(http_request_duration_seconds_bucket{le="0.5"}[1d]))
          /
          (sum(rate(http_request_duration_seconds_count[1d])) > 0)
          or vector(1)
        interval: 30s
      - name: slo:http_request_duration:ratio_below_2s_5m
        expr: |
          sum(rate(http_request_duration_seconds_bucket{le="2"}[5m]))
          /
          (sum(rate(http_request_duration_seconds_count[5m])) > 0)
          or vector(1)
        interval: 30s
      - name: slo:http_request_duration:p95_5m
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))
        interval: 30s
      - name: slo:http_request_duration:p99_5m
        expr: |
          histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))
        interval: 30s
      - name: slo:http_request_duration:p95_1h
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[1h])) by (le))
        interval: 30s
      - name: slo:http_request_duration:p99_1h
        expr: |
          histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[1h])) by (le))
        interval: 30s
      - name: slo:server:probe_success_ratio_5m
        expr: |
          max(avg_over_time(up{job="krystalinex-server"}[5m]))
          or vector(1)
        interval: 30s
      - name: slo:server:probe_success_ratio_1h
        expr: |
          max(avg_over_time(up{job="krystalinex-server"}[1h]))
          or vector(1)
        interval: 30s
      - name: slo:server:probe_success_ratio_1d
        expr: |
          max(avg_over_time(up{job="krystalinex-server"}[1d]))
          or vector(1)
        interval: 30s
      - name: slo:availability:composite_1h
        expr: |
          (1 - (slo:http_requests:error_ratio_1h or vector(0)))
          *
          (slo:server:probe_success_ratio_1h or vector(1))
        interval: 30s
      - name: slo:availability:composite_1d
        expr: |
          (1 - (slo:http_requests:error_ratio_1d or vector(0)))
          *
          (slo:server:probe_success_ratio_1d or vector(1))
        interval: 30s
      - name: slo:availability:error_budget_remaining
        expr: |
          1 - (
            (1 - (slo:availability:composite_1d or vector(1)))
            / (1 - 0.999)
          )
        interval: 1m
      - name: slo:latency:error_budget_remaining
        expr: |
          1 - (
            (1 - slo:http_request_duration:ratio_below_500ms_1d)
            / (1 - 0.95)
          )
        interval: 1m
      - name: genai:client_operation_duration:p95_5m
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(gen_ai_client_operation_duration_seconds_bucket[5m]))
              by (le, provider, model, operation)
          )
        interval: 30s
      - name: genai:client_operation_duration:p99_5m
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(gen_ai_client_operation_duration_seconds_bucket[5m]))
              by (le, provider, model, operation)
          )
        interval: 30s
      - name: genai:client_operation:error_ratio_5m
        expr: |
          sum(rate(gen_ai_client_operations_total{status=~"error|timeout"}[5m]))
            by (provider, model, operation)
          /
          clamp_min(
            sum(rate(gen_ai_client_operations_total[5m]))
              by (provider, model, operation),
            0.000001
          )
        interval: 30s
      - name: genai:client_token_usage:rate_1h
        expr: |
          sum(rate(gen_ai_client_token_usage_sum[1h]))
            by (model, direction)
        interval: 30s
      - name: genai:rca_analysis_duration:p95_5m
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(kx_llm_analysis_duration_seconds_bucket[5m])) by (le)
          )
        interval: 30s
      - name: genai:rca_analysis:failure_ratio_5m
        expr: |
          sum(rate(kx_llm_analysis_total{status=~"failure|timeout"}[5m]))
            by (use_case)
          /
          clamp_min(
            sum(rate(kx_llm_analysis_total[5m])) by (use_case),
            0.000001
          )
        interval: 30s
      - name: finops:requests:rate_per_service_5m
        expr: |
          sum(rate(http_requests_total[5m])) by (job)
        interval: 1m
      - name: finops:errors:rate_per_service_5m
        expr: |
          sum(rate(http_request_errors_total[5m])) by (job)
        interval: 1m
      - name: finops:spans:exported_rate_5m
        expr: |
          sum(rate(otelcol_exporter_sent_spans_total[5m]))
        interval: 1m
      - name: finops:spans:dropped_rate_5m
        expr: |
          sum(rate(otelcol_processor_dropped_spans_total[5m]))
        interval: 1m
      - name: finops:spans:sampling_ratio
        expr: |
          (
            sum(rate(otelcol_exporter_sent_spans_total[5m]))
            / (
              sum(rate(otelcol_exporter_sent_spans_total[5m]))
              + sum(rate(otelcol_processor_dropped_spans_total[5m]))
            )
          ) or vector(1)
        interval: 1m
      - name: finops:logs:bytes_rate_per_component_5m
        expr: |
          sum(rate(promtail_read_bytes_total[5m])) by (filename)
        interval: 1m
      - name: finops:cost:request_units_per_service_1h
        expr: |
          (
            sum(increase(http_requests_total[1h])) by (job)
            * 0.000001
          )
        interval: 1m
      - name: finops:cost:telemetry_index_1h
        expr: |
          (
            sum(increase(http_requests_total[1h])) * 0.000001
          )
          +
          (
            sum(rate(otelcol_exporter_sent_spans_total[5m])) * 3600 * 0.00001
          )
        interval: 1m
      - name: finops:cpu:usage_per_pod_5m
        expr: |
          sum(rate(container_cpu_usage_seconds_total{namespace="krystalinex", container!=""}[5m])) by (pod) * 3600
        interval: 5m
      - name: finops:memory:usage_per_pod_gb_hours
        expr: |
          sum(container_memory_working_set_bytes{namespace="krystalinex", container!=""}) by (pod) / 1073741824
        interval: 5m
      - name: finops:kong:overhead_seconds
        expr: |
          histogram_quantile(0.99,
            sum(rate(kong_kong_latency_ms_bucket[5m])) by (le)
          ) / 1000
        interval: 5m
