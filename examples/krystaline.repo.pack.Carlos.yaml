    - id: kx-mcp-observability-trace-coverage
      provider:
        kind: grafana
        version: "1"
        schemaVersion: 39
      folder: krystalinex
      source: file://k8s/charts/krystalinex/dashboards/mcp-observability-trace-coverage.json
      params:
        title: MCP Observability & Trace Coverage
        uid: kx-mcp-observability-trace-coverage
        panel_count: 18
        query_panel_count: 20
        panels:
          - panel: tool_calls
            title: Tool Calls
            expr: sum(rate(mcp_tool_calls_total{job=~"$mcp_job"}[5m]))
            refId: ''
            datasource: prometheus
            metrics:
              - mcp_tool_calls_total
          - panel: error_rate
            title: Error Rate
            expr: 100 * sum(rate(mcp_tool_calls_total{job=~"$mcp_job",status="error"}[5m])) / clamp_min(sum(rate(mcp_tool_calls_total{job=~"$mcp_job"}[5m])), 0.000001)
            refId: ''
            datasource: prometheus
            metrics:
              - mcp_tool_calls_total
          - panel: metrics_coverage
            title: Metrics Coverage
            expr: 100 * count(up{job=~"otel-mcp-server|mcp-public"} == 1) / 2
            refId: ''
            datasource: prometheus
            metrics:
              - up
          - panel: mcp_services
            title: MCP Services
            expr: count(up{job=~"otel-mcp-server|mcp-public"} == 1)
            refId: ''
            datasource: prometheus
            metrics:
              - up
          - panel: trace_gap
            title: Trace Gap
            expr: absent(mcp_server_operation_duration_seconds_count) or vector(0)
            refId: ''
            datasource: prometheus
            metrics:
              - mcp_server_operation_duration_seconds_count
          - panel: mcp_tool_call_volume
            title: MCP Tool Call Volume
            expr: sum by (job, status) (rate(mcp_tool_calls_total{job=~"$mcp_job"}[5m]))
            refId: ''
            datasource: prometheus
            metrics:
              - mcp_tool_calls_total
          - panel: mcp_operation_latency
            title: MCP Operation Latency
            expr: histogram_quantile(0.50, sum(rate(mcp_server_operation_duration_seconds_bucket{job=~"$mcp_job"}[5m])) by (le, tool))
            refId: ''
            datasource: prometheus
            metrics:
              - mcp_server_operation_duration_seconds_bucket
          - panel: mcp_operation_latency
            title: MCP Operation Latency
            expr: histogram_quantile(0.95, sum(rate(mcp_server_operation_duration_seconds_bucket{job=~"$mcp_job"}[5m])) by (le, tool))
            refId: ''
            datasource: prometheus
            metrics:
              - mcp_server_operation_duration_seconds_bucket
          - panel: mcp_operation_latency
            title: MCP Operation Latency
            expr: histogram_quantile(0.99, sum(rate(mcp_server_operation_duration_seconds_bucket{job=~"$mcp_job"}[5m])) by (le, tool))
            refId: ''
            datasource: prometheus
            metrics:
              - mcp_server_operation_duration_seconds_bucket
          - panel: mcp_operation_latency
            title: MCP Operation Latency
            expr: histogram_quantile(0.95, sum(rate(mcp_backend_duration_seconds_bucket{job=~"$mcp_job"}[5m])) by (le, backend))
            refId: ''
            datasource: prometheus
            metrics:
              - mcp_backend_duration_seconds_bucket
          - panel: collector_pipeline_health
            title: Collector / Pipeline Health
            expr: 100 * up{job=~"otel-collector|otel-mcp-server|mcp-public|jaeger"}
            refId: ''
            datasource: prometheus
            metrics:
              - up
          - panel: collector_pipeline_health
            title: Collector / Pipeline Health
            expr: sum(rate(otelcol_exporter_send_failed_spans_total[5m]))
            refId: ''
            datasource: prometheus
            metrics:
              - otelcol_exporter_send_failed_spans_total
          - panel: trace_coverage_by_service
            title: Trace Coverage by Service
            expr: 100 * up{job=~"otel-mcp-server|mcp-public|jaeger|otel-collector"}
            refId: ''
            datasource: prometheus
            metrics:
              - up
          - panel: trace_coverage_by_service
            title: Trace Coverage by Service
            expr: 0 * absent(mcp_server_operation_duration_seconds_count)
            refId: ''
            datasource: prometheus
            metrics:
              - mcp_server_operation_duration_seconds_count
          - panel: backend_requests_and_sessions
            title: Backend Requests and Sessions
            expr: sum by (backend) (rate(mcp_backend_requests_total{job=~"$mcp_job"}[5m]))
            refId: ''
            datasource: prometheus
            metrics:
              - mcp_backend_requests_total
          - panel: backend_requests_and_sessions
            title: Backend Requests and Sessions
            expr: sum by (route, status_code) (rate(mcp_http_requests_total{job=~"$mcp_job"}[5m]))
            refId: ''
            datasource: prometheus
            metrics:
              - mcp_http_requests_total
          - panel: backend_requests_and_sessions
            title: Backend Requests and Sessions
            expr: mcp_active_sessions{job=~"$mcp_job"}
            refId: ''
            datasource: prometheus
            metrics:
              - mcp_active_sessions
          - panel: backend_requests_and_sessions
            title: Backend Requests and Sessions
            expr: sum by (result) (rate(mcp_auth_attempts_total{job=~"$mcp_job"}[5m]))
            refId: ''
            datasource: prometheus
            metrics:
              - mcp_auth_attempts_total
          - panel: mcp_pipeline_uptime_bands
            title: MCP / Pipeline Uptime Bands
            expr: up{job=~"otel-mcp-server|mcp-public|jaeger|otel-collector"}
            refId: ''
            datasource: prometheus
            metrics:
              - up
          - panel: mcp_operation_latency_field
            title: MCP Operation Latency Field
            expr: sum(rate(mcp_server_operation_duration_seconds_bucket{job=~"$mcp_job"}[5m])) by (le)
            refId: ''
            datasource: prometheus
            metrics:
              - mcp_server_operation_duration_seconds_bucket
    - id: kx-predictive-finops
      provider:
        kind: grafana
