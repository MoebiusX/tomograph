            refId: A
            datasource: prometheus
            metrics:
              - kx_llm_events_by_severity_total
          - panel: llm_events_by_severity_current_sev1-3
            title: "LLM Events by Severity (current: SEV1-3)"
            expr: sum(increase(kx_llm_events_by_severity_total{severity="sev2"}[5m]))
            refId: B
            datasource: prometheus
            metrics:
              - kx_llm_events_by_severity_total
          - panel: llm_events_by_severity_current_sev1-3
            title: "LLM Events by Severity (current: SEV1-3)"
            expr: sum(increase(kx_llm_events_by_severity_total{severity="sev3"}[5m]))
