            datasource: loki
            metrics: []
          - panel: application_logs
            title: Application Logs
            expr: "{namespace=\"krystalinex\", container=~\"postgresql|rabbitmq|payment-processor\"} |= `` != `caller=` != `index_set` != `uploading table`"
            refId: D
