  alerting:
    routes:
      - severity: SEV2
        channels:
          - webhook: http://helmvalue-goalert:8081/goalert/api/v2/prometheusalertmanager/incoming?token=${ALERTMANAGER_GOALERT_GENERAL_TOKEN}
      - severity: SEV2
        channels:
          - webhook: https://www.krystaline.io/
      - severity: SEV1
        channels:
          - email: carlos@krystaline.io
          - webhook: http://helmvalue-goalert:8081/goalert/api/v2/prometheusalertmanager/incoming?token=${ALERTMANAGER_GOALERT_CRITICAL_TOKEN}
      - severity: SEV1
        channels:
          - webhook: https://ntfy.sh/${NTFY_TOPIC}?priority=urgent&tags=rotating_light,critical&title=CRITICAL+Alert
      - severity: SEV2
        channels:
          - webhook: http://helmvalue-goalert:8081/goalert/api/v2/prometheusalertmanager/incoming?token=${ALERTMANAGER_GOALERT_GENERAL_TOKEN}
      - severity: SEV2
        channels:
          - webhook: http://helmvalue-goalert:8081/goalert/api/v2/prometheusalertmanager/incoming?token=${ALERTMANAGER_GOALERT_GENERAL_TOKEN}
      - severity: SEV2
        channels:
          - webhook: http://helmvalue-goalert:8081/goalert/api/v2/generic/incoming?token=${ALERTMANAGER_GOALERT_SECURITY_TOKEN}
