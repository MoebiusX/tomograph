    - id: krystalinex-unified
      provider:
        kind: grafana
        version: "3"
        schemaVersion: 42
      folder: krystalinex
      source: file://k8s/charts/krystalinex/dashboards/unified-observability.json
      params:
        title: KrystalineX Unified Observability 2026
        uid: krystalinex-unified
        panel_count: 64
        query_panel_count: 68
        panels:
          - panel: http_request_rate
            title: HTTP Request Rate
            expr: sum(rate(http_requests_total{method=~"$method",route=~"$route",status_code=~"$status"}[5m])) by (method)
            refId: A
            datasource: prometheus
            metrics:
              - http_requests_total
          - panel: response_latency_p50_p95
            title: Response Latency (P50 / P95)
            expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{method=~"$method",route=~"$route"}[5m])) by (le))
            refId: A
            datasource: prometheus
            metrics:
              - http_request_duration_seconds_bucket
            binds_to: slis.slo_http_request_duration
            binding_confidence: inferred
            binding_reason: shared metrics:http_request_duration_seconds_bucket, keywords:http|request|duration|ratio
          - panel: response_latency_p50_p95
            title: Response Latency (P50 / P95)
            expr: histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{method=~"$method",route=~"$route"}[5m])) by (le))
            refId: B
            datasource: prometheus
            metrics:
              - http_request_duration_seconds_bucket
            binds_to: slis.slo_http_request_duration
            binding_confidence: inferred
            binding_reason: shared metrics:http_request_duration_seconds_bucket, keywords:http|request|duration|ratio
          - panel: server_errors_5xx
            title: Server Errors (5xx)
            expr: (sum(rate(http_request_errors_total{method=~"$method",route=~"$route",status_code=~"5.."}[5m])) or vector(0)) / (sum(rate(http_requests_total{method=~"$method",route=~"$route",status_code=~"$status"}[5m])) > 0) * 100 or vector(0)
            refId: A
            datasource: prometheus
            metrics:
              - http_request_errors_total
              - http_requests_total
            binds_to: slis.slo_http_requests
            binding_confidence: declared-inferred
            binding_reason: shared metrics:http_request_errors_total|http_requests_total, keywords:http|requests|error|request
          - panel: client_errors_4xx
            title: Client Errors (4xx)
            expr: (sum(rate(http_request_errors_total{method=~"$method",route=~"$route",status_code=~"4.."}[5m])) or vector(0)) / (sum(rate(http_requests_total{method=~"$method",route=~"$route",status_code=~"$status"}[5m])) > 0) * 100 or vector(0)
            refId: A
            datasource: prometheus
            metrics:
              - http_request_errors_total
              - http_requests_total
            binds_to: slis.slo_http_requests
            binding_confidence: declared-inferred
            binding_reason: shared metrics:http_request_errors_total|http_requests_total, keywords:http|requests|error|request
          - panel: requests_last_hour
            title: Requests (Last Hour)
            expr: sum(increase(http_requests_total{method=~"$method",route=~"$route",status_code=~"$status"}[1h]))
            refId: A
            datasource: prometheus
            metrics:
              - http_requests_total
          - panel: server_memory
            title: Server Memory
            expr: nodejs_process_resident_memory_bytes{job="krystalinex-server"}
            refId: A
            datasource: prometheus
            metrics:
              - nodejs_process_resident_memory_bytes
          - panel: security_events
            title: 🔐 Security Events
            expr: increase(kx_security_events_total[$__range])
            refId: A
            datasource: prometheus
            metrics:
              - kx_security_events_total
          - panel: high_critical_events_1h
