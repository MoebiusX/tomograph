# Optional alternative to the in-pod fetcher sidecar.
#
# This CronJob runs the same fetcher on a schedule, writing into a PVC that
# the Studio Deployment can mount.  Use this if you want refresh history to
# survive pod restarts, or if you want to scale the Studio to >1 replica
# (emptyDir is per-pod; multiple replicas would each have stale data).
#
# Requires a StorageClass that supports ReadWriteMany (e.g. NFS, EFS, Azure
# Files, Longhorn).  For docker-desktop / kind, prefer the sidecar pattern in
# deployment-studio.yaml instead.
#
# When using this CronJob:
#   1. Remove the `fetcher` container from deployment-studio.yaml.
#   2. Replace the `docroot` emptyDir with a PVC mount.
#   3. Apply this manifest.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: studio-packs
  labels:
    app.kubernetes.io/name: observabilitypack-studio
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 64Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: studio-fetch-live-pack
  labels:
    app.kubernetes.io/name: observabilitypack-studio
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 120
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: fetcher
              image: node:20-alpine
              command:
                - sh
                - -c
                - |
                  set -eu
                  cd /opt/app
                  node tools/fetch-live-pack.mjs
              env:
                - name: MCP_URL
                  valueFrom:
                    configMapKeyRef: { name: studio-fetcher-config, key: MCP_URL }
                - name: OUTPUT
                  value: /data/packs/production-live.json
                - name: MCP_AUTH
                  valueFrom:
                    secretKeyRef:
                      name: studio-mcp-auth
                      key: token
                      optional: true
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: fetcher-script
                  mountPath: /opt/app/tools
                  readOnly: true
              resources:
                requests: { cpu: 50m,  memory: 64Mi }
                limits:   { cpu: 500m, memory: 256Mi }
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: { drop: ["ALL"] }
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: studio-packs
            - name: fetcher-script
              configMap:
                name: studio-fetcher-script
