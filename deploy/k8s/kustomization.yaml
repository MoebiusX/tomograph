# ─────────────────────────────────────────────────────────────────────────────
# Tomograph (observabilitypack-studio) — Kustomize entry point.
#
# The studio is no longer a static HTML bundle behind nginx; it is served by
# the Express server in server/index.mjs, packaged by the repo-root Dockerfile.
# Nothing is embedded via ConfigMaps any more — packs, schema, and studio
# assets all ship inside the image.
#
# Build + make the image visible to the cluster, then apply:
#   docker build -t tomograph:0.3.0 .
#   # docker-desktop: nothing more to do.  kind: `kind load docker-image tomograph:0.3.0`
#   # remote cluster: push to a registry and override below, e.g.
#   #   kustomize edit set image tomograph=ghcr.io/moebiusx/tomograph:0.3.0
#   kubectl apply -k deploy/k8s
#
# Customise:
#   - Edit deploy/k8s/ingress.yaml host / ingressClassName for your cluster.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: observability

resources:
  - deployment-studio.yaml
  - service.yaml
  - ingress.yaml

images:
  - name: tomograph
    newTag: 0.3.0

labels:
  - pairs:
      app.kubernetes.io/part-of: observabilitypack-studio
