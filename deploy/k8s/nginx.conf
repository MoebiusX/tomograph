# nginx config for the studio pod. Listens on 8080 (unprivileged image),
# serves the merged docroot, and redirects `/` -> `/studio/observabilitypack-studio.html`.
server {
    listen       8080 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  observabilitypack-studio.html;

    # Friendly entry point.
    location = / {
        return 302 /studio/observabilitypack-studio.html;
    }

    # The live pack must not be cached — it's the freshness signal.
    location = /packs/production-live.json {
        add_header Cache-Control "no-store, max-age=0";
        try_files $uri =404;
    }

    # Static packs and schema can be cached briefly.
    location ~ ^/(packs|schema)/ {
        add_header Cache-Control "public, max-age=60";
        try_files $uri =404;
    }

    # Studio HTML.
    location /studio/ {
        add_header Cache-Control "public, max-age=300";
        try_files $uri $uri/ =404;
    }

    # Trivial liveness endpoint for probes / external healthchecks.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
