# Ingress for the studio. Adjust `host`, `ingressClassName`, and TLS to match
# your cluster.
#
# The studio shell uses absolute asset and API paths (`/app.css`, `/api/...`),
# so it must be served at the origin root: use a dedicated host (subdomain)
# with path `/` as below. Mounting it under a path prefix (e.g. /obspack)
# would require rewrite rules in the app itself — not supported.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: observabilitypack-studio
  labels:
    app.kubernetes.io/name: observabilitypack-studio
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: obspack.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: observabilitypack-studio
                port:
                  number: 80
