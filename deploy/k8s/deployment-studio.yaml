# ─────────────────────────────────────────────────────────────────────────────
# Tomograph studio + API — one Express container (server/index.mjs).
#
# v0.3 replaced the old nginx + ConfigMap-statics + fetcher-sidecar layout:
# the server renders nothing statically embeddable — the studio shell needs
# the /api/* routes (validate, adapt, conformance, compile, deploy) that run
# in the same process. Live MCP drafting is interactive (POST
# /api/draft-from-mcp); the MCP URL and auth key are supplied by the user in
# the studio UI per request, so there is no fetcher sidecar, no MCP secret,
# and no refresh CronJob in this deploy.
#
# Image: built from the repo-root Dockerfile (see kustomization.yaml).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: observabilitypack-studio
  labels:
    app.kubernetes.io/name: observabilitypack-studio
    app.kubernetes.io/component: studio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: observabilitypack-studio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: observabilitypack-studio
        app.kubernetes.io/component: studio
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000           # `node` user in the official node image
        runAsGroup: 1000
      containers:
        - name: studio
          image: tomograph:0.3.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
            # Optional: raises GitHub API rate limits and enables private
            # repos for POST /api/crawl-github.
            # - name: GITHUB_TOKEN
            #   valueFrom:
            #     secretKeyRef: { name: studio-github-token, key: token }
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests: { cpu: 25m,  memory: 96Mi }
            limits:   { cpu: 500m, memory: 384Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            # NOT readOnlyRootFilesystem: POST /api/refresh-live writes
            # examples/production-live.pack.yaml inside the container.
            # The file is ephemeral by design (pod restart clears it).
