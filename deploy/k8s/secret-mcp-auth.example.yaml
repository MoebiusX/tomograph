# Example Secret holding the MCP bearer token. DO NOT COMMIT a real token.
#
# Generate from the value of `.Values.otelMcpServer.auth.agentKey` in
# krystalinex-core's Helm chart (rendered into the `<release>-mcp-auth` Secret
# under key `auth-keys.json`).  Extract just the `key` field for the
# `copilot-agent` entry and paste below, then `kubectl apply -f` this file.
#
#   echo -n 'YOUR-COPILOT-AGENT-KEY' | base64
#
# Or use stringData (kubectl will base64-encode):
apiVersion: v1
kind: Secret
metadata:
  name: studio-mcp-auth
  labels:
    app.kubernetes.io/name: observabilitypack-studio
type: Opaque
stringData:
  token: "REPLACE_ME_WITH_COPILOT_AGENT_KEY"
