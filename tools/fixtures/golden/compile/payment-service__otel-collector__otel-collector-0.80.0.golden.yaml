    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25
  batch:
    timeout: 10s
  transform:
    log_statements:
      - context: log
        statements:
          - set(attributes["service.namespace"], "payments") where attributes["service.namespace"] == nil
  tail_sampling:
    decision_wait: 10s
    policies:
      - name: errors
        type: status_code
        status_code:
          status_codes:
            - ERROR
      - name: slow
        type: latency
        latency:
          threshold_ms: 500
      - name: probabilistic
        type: probabilistic
        probabilistic:
          sampling_percentage: 5
  attributes/redact:
    actions:
      - key: pan
        action: delete
      - key: cvv
        action: delete
      - key: customer.email
        action: hash
exporters:
