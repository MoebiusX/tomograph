name: pages

# Publishes the landing page at repo root (index.html) to GitHub Pages.
# The landing page is a static stand-in — it explains what the studio is,
# how to run it locally, and links to the canonical spec. It does NOT
# bundle the studio itself.
#
# Background: through Studio v0.2 the studio was a single static HTML file
# with embedded JSON packs, which Pages could host fine. From Studio v0.3
# (the spec v1.2 migration, Phase 3a) the studio is split into:
#
#   - studio/{index.html, app.css, app.mjs}  thin client, fetches over HTTP
#   - server/index.mjs                       Express server that runs the
#                                            validator + adapter and exposes
#                                            /api/packs etc.
#
# A static Pages deploy can no longer serve a working studio. Hosting the
# real thing needs a Node runtime — coming after the current milestone.

on:
  push:
    branches: [main]
    paths:
      - index.html
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v6

      # Stage just the landing page + nothing else. We don't want Pages
      # serving every file in the repo (LICENSE, src trees, etc.).
      - name: Stage landing page
        run: |
          mkdir -p _site
          cp index.html _site/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v5
