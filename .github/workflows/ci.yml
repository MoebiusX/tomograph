name: ci

# Validates every push to develop/main and every PR targeting main.
# Zero npm deps in this repo, so we skip install entirely.

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint fetcher (node --check)
        run: npm run lint:fetcher

      - name: Lint adapter (node --check)
        run: npm run lint:adapter

      - name: Lint server (node --check)
        run: npm run lint:server

      - name: Lint studio client (node --check)
        run: npm run lint:studio

      - name: Verify vendored spec checksums
        run: npm run sync-spec:check

      - name: Validate canonical example against spec v1.2 schema
        run: npm run validate

      - name: Adapter regression suite
        run: npm run test:adapt

      - name: Fetcher regression suite (offline, schema + YAML round-trip)
        run: npm run test:fetch

      - name: Bundled-pack regression suite (validate + adapt + conformance)
        run: npm run test:packs

      - name: Server smoke test (start, hit each route, assert)
        run: npm run test:server

      - name: Smoke-check studio HTML is parseable
        run: |
          node -e "const fs=require('fs');const html=fs.readFileSync('studio/index.html','utf8');if(!html.includes('</html>'))process.exit(1);console.log('studio html ok ('+html.length+' bytes)')"
