name: ci

# Validates every push to develop/main and every PR targeting main.
# Zero npm deps in this repo, so we skip install entirely.

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Lint fetcher (node --check)
        run: npm run lint:fetcher

      # Phase 0 of the v1.2 migration deleted schema/pack.schema.json (the old
      # studio display schema) and vendored the canonical spec under
      # vendor/observability-pack-spec/v1.2/. Pack validation is offline until
      # Phase 1 rewires tools/validate-pack.mjs against the vendored canonical
      # schema. In the meantime, drift-check the vendored spec — the only
      # validation gate we can run today.
      - name: Verify vendored spec checksums
        run: npm run sync-spec:check

      # TODO(phase-1): restore once tools/validate-pack.mjs targets the
      # canonical schema and bundled packs migrate to canonical YAML.
      # - name: Validate all packs against schema
      #   run: npm run validate

      - name: Smoke-check studio HTML is parseable
        run: |
          node -e "const fs=require('fs');const html=fs.readFileSync('studio/observabilitypack-studio.html','utf8');if(!html.includes('</html>'))process.exit(1);console.log('studio html ok ('+html.length+' bytes)')"
