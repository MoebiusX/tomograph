name: ci

# Validates every push to develop/main and every PR targeting main.
# Runtime deps are installed with `npm ci` (express is a dependency).

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Pinned backend-validator binaries (promtool / amtool /
      # otelcol-contrib) — cached by the pin versions baked into the
      # fetch script, so the ~300MB download happens once per bump.
      - name: Cache backend validators
        uses: actions/cache@v4
        with:
          path: .tools
          key: validators-${{ runner.os }}-${{ hashFiles('tools/fetch-validators.mjs') }}

      - name: Fetch backend validators (pinned, sha256-verified)
        run: npm run fetch-validators

      - name: Audit runtime dependencies (high+)
        run: npm audit --omit=dev --audit-level=high

      - name: Lint fetcher (node --check)
        run: npm run lint:fetcher

      - name: Lint adapter (node --check)
        run: npm run lint:adapter

      - name: Lint server (node --check)
        run: npm run lint:server

      - name: Lint studio client (node --check)
        run: npm run lint:studio

      - name: Lint CLI dispatcher (node --check)
        run: npm run lint:cli

      - name: Lint ZIP writer (node --check)
        run: npm run lint:zip

      - name: ESLint (correctness rules; warnings allowed, errors fail)
        run: npm run lint

      - name: Verify vendored spec checksums
        run: npm run sync-spec:check

      - name: Validate canonical example against spec v1.2 schema
        run: npm run validate

      - name: Backend validation — strict (promtool / amtool / otelcol-contrib)
        run: npm run test:backend:strict

      - name: Regression suites + coverage (adapt / fetch / packs / compile / profiles / crawl / server)
        run: npm run coverage

      - name: Upload coverage (lcov)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: ignore

      - name: Smoke-check studio HTML is parseable
        run: |
          node -e "const fs=require('fs');const html=fs.readFileSync('studio/index.html','utf8');if(!html.includes('</html>'))process.exit(1);console.log('studio html ok ('+html.length+' bytes)')"

  # T4 — the product-story round trip against a REAL Grafana:
  # compile → deploy-bulk (real MCP path) → fetch-live → diff → aligned.
  # Separate job: needs docker; the validate job stays fast.
  backend-live:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # pulls Grafana 12.4.4 + 13.0.2 images cold
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Round trip vs live Grafana (strict)
        run: npm run test:backend:live:strict
