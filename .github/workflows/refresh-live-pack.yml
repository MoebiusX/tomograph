name: refresh-live-pack

# Build a production-live pack from the live MCP server.
# The fetcher builds a canonical ObservabilityPack v1.2 manifest from the
# MCP responses, validates it against the vendored schema, and uploads the
# result as a workflow artifact. Live snapshots are runtime evidence, not
# committed source fixtures.
#
# Configure secrets MCP_URL and (optionally) MCP_AUTH in repo settings.

on:
  # The every-15-minute schedule was removed on 2026-06-08: the automated
  # chore(live) commits push to develop AND main, racing manual pushes and
  # dominating history. Refresh on demand (workflow_dispatch) or when the
  # fetcher code changes (push). Re-add a `schedule:` block here to restore.
  workflow_dispatch:
  push:
    paths:
      - tools/fetch-live-pack.mjs
      - tools/lib/adapter.mjs
      - tools/lib/mini-yaml.mjs
      - tools/lib/validator.mjs

permissions:
  contents: read

concurrency:
  group: refresh-live-pack
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      # The fetcher itself has no runtime deps, but reads SCHEMA via the
      # shared validator module. No `npm ci` needed.

      - name: Fetch live pack from MCP
        env:
          MCP_URL:  ${{ secrets.MCP_URL }}
          MCP_AUTH: ${{ secrets.MCP_AUTH }}
          OUTPUT:   .tmp-production-live.pack.yaml
        run: node tools/fetch-live-pack.mjs

      - name: Upload live pack artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-live-pack
          path: .tmp-production-live.pack.yaml
          if-no-files-found: error
          # The output is dot-prefixed (matches the repo's .tmp-* scratch
          # convention); v4 skips hidden files unless told otherwise.
          include-hidden-files: true
