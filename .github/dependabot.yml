version: 2
updates:
  # Keep GitHub Actions (actions/checkout, setup-node, configure-pages,
  # upload-pages-artifact, deploy-pages, ...) on their latest majors.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - github-actions
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
