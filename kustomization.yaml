# ─────────────────────────────────────────────────────────────────────────────
# observabilitypack-studio — Kustomize entry point.
#
# Lives at the repo root because kustomize's default load-restrictor (`rootOnly`)
# forbids file references outside the kustomization directory. Sourcing the
# Studio HTML, packs, schema and fetcher script as ConfigMaps from their
# canonical locations requires the kustomization to sit at or above them.
#
# Apply:
#   kubectl apply -k .
#
# Customise:
#   - Edit deploy/k8s/configmap-fetcher-config.yaml to point at your MCP URL.
#   - Copy deploy/k8s/secret-mcp-auth.example.yaml to deploy/k8s/secret-mcp-auth.yaml,
#     fill in the token, and uncomment its reference under `resources` below.
#   - Edit deploy/k8s/ingress.yaml host / ingressClassName for your cluster.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: observability

resources:
  - deploy/k8s/configmap-fetcher-config.yaml
  - deploy/k8s/deployment-studio.yaml
  - deploy/k8s/service.yaml
  - deploy/k8s/ingress.yaml
  # Uncomment after creating deploy/k8s/secret-mcp-auth.yaml from the .example:
  # - deploy/k8s/secret-mcp-auth.yaml
  # Uncomment to use the CronJob+PVC pattern instead of the sidecar:
  # - deploy/k8s/cronjob-fetch-live-pack.yaml

configMapGenerator:
  - name: studio-html
    files:
      - studio/observabilitypack-studio.html
  - name: studio-packs
    files:
      - packs/production-curated.json
      - packs/target-advanced.json
      - packs/demo-skeleton.json
  - name: studio-schema
    files:
      - schema/pack.schema.json
  - name: studio-nginx-conf
    files:
      - default.conf=deploy/k8s/nginx.conf
  - name: studio-fetcher-script
    files:
      - tools/fetch-live-pack.mjs

generatorOptions:
  disableNameSuffixHash: false

labels:
  - pairs:
      app.kubernetes.io/part-of: observabilitypack-studio